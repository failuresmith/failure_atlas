name: Auto Update Generated Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install site generator dependencies
        run: uv sync --project site --frozen

      - name: Rebuild docs from source markdown
        run: uv run --project site python site/build.py

      - name: Commit and push docs if changed
        run: |
          if git diff --quiet -- docs; then
            echo "No docs changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore(docs): auto-update generated site [skip ci]"
          git push
